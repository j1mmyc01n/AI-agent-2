[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# Important: Ensure DATABASE_URL environment variable is set in Netlify UI
# For production, use PostgreSQL or another cloud database service
# SQLite is not compatible with Netlify's serverless architecture
