[build]
  # Map Netlify Neon integration env vars to Prisma-expected names and push schema
  command = """
    if [ -z "$DATABASE_URL" ] && [ -n "$NETLIFY_DATABASE_URL" ]; then export DATABASE_URL="$NETLIFY_DATABASE_URL"; fi && \
    if [ -z "$DIRECT_URL" ] && [ -n "$NETLIFY_DATABASE_URL_UNPOOLED" ]; then export DIRECT_URL="$NETLIFY_DATABASE_URL_UNPOOLED"; fi && \
    npx prisma generate && \
    npx prisma db push --skip-generate --accept-data-loss && \
    next build
  """

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# CRITICAL: Set these environment variables in Netlify UI for runtime
# (DO NOT set DATABASE_URL here - it would override the runtime value)
#
# Required for the application to function:
# - DATABASE_URL (PostgreSQL connection string from Neon/Supabase/Railway)
# - NEXTAUTH_URL (your site URL, e.g., https://dobetteragent2.netlify.app)
# - NEXTAUTH_SECRET (generate with: openssl rand -base64 32)
#
# Optional but recommended:
# - OPENAI_API_KEY (for AI chat functionality)
# - GITHUB_ID and GITHUB_SECRET (for GitHub OAuth login)
# - TAVILY_API_KEY (for web search functionality)
# - STRIPE_SECRET_KEY and NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY (for payments)
